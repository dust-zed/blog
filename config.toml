theme = 'hugo-theme-stack'
baseURL = "https://www.dust-zed.site"
title = "zed的博客"
languageCode = "zh-cn"
DefaultContentLanguage = "zh-cn"
SectionPagesMenu = "main"
googleAnalytics = ""
enableRobotsTXT = true
buildDrafts = false
buildFuture = false

[server]
relativeURLs = true

[sitemap]
changefreq = "monthly"
priority = 0.5
filename = "sitemap.xml"

[taxonomies]
category = "categories"
tag = "tags"

[cascade]
_target = { path = "/categories/rust/**" }


[params]
text_color = ""
favicon = ""
site_logo = ""
description = "The last theme you'll ever need. Maybe."
# choose a background color from any on this page: https://tachyons.io/docs/themes/skins/ and preface it with "bg-"
background_color_class = "bg-black"
recent_posts_number = 3
menu_layout = "multilevel"  # stack 主题特有配置
  [params.notes]
    enabled = true
    showConnections = true

[author]
name = "zed"
email = "zed118@gmail.com"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
